    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; margin: 0; padding: 0; font-family: sans-serif; background: #222; }
    body { display: flex; flex-direction: column; }
    .pane-main { flex: 1; display: flex; flex-direction: row; overflow: hidden; border-bottom: 1px solid #000; }
    .pane-left { flex: 1; display: flex; flex-direction: column; background: #fff; border-right: 1px solid #000; min-width: 0; }
    .pane-right { flex: 1; display: flex; flex-direction: column; background: #eee; position: relative; min-width: 0; }
    .area-editor { flex: 1; display: flex; flex-direction: column; padding: 4px; overscroll-behavior: contain; }
    .area-editor .input { flex: 1; width: 100%; font-family: monospace; font-size: 11px; resize: none; padding: 10px; border: 1px solid #ccc; outline: none; line-height: 1.5; }
    .area-errors { background: #fee; font-size: 10px; color: #d00; padding: 2px 8px; border-top: 1px solid #fcc; flex-shrink: 0; }
    .area-footer { flex-shrink: 0; background: #fafafa; padding: 6px; display: flex; flex-direction: column; gap: 4px; }
    .button-group { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
    .button { padding: 6px 10px; background: #fff; border: 1px solid #aaa; font-size: 12px; border-radius: 4px; cursor: pointer; color: #333; text-decoration: none; text-align: center; }
    .button.is-active { background: #007bff; color: #fff; border-color: #0056b3; font-weight: bold; }
    .area-pages { flex: 1; overflow: auto; padding: 5px; -webkit-overflow-scrolling: touch; }
    .page-preview { transition: width 0.1s ease; margin: 0 auto; width: 100%; display: inline-block; }
    canvas { background: #ccc; box-shadow: 0 4px 10px rgba(0,0,0,0.2); width: 100% !important; height: auto !important; display: block; margin: 0 auto; }
    .page-statistics, .page-gradation { background: #fff; padding: 8px; text-align: left; border-radius: 4px; height: 100%; overflow-y: auto; font-size: 12px; line-height: 1.4; }
    .page-statistics h2, .page-gradation h2 { margin: 10px 0 5px; font-size: 18px; border-bottom: 2px solid #333; }
    .stat-row { display: flex; border-bottom: 1px solid #eee; padding: 2px 0; }
    .stat-label { font-weight: bold; width: 70px; color: #666; flex-shrink: 0; }
    .st-main-title { font-size: 1.4em; font-weight: bold; margin-bottom: 2px; display: block; }
    .st-main-subtitle { font-size: 1.1em; color: #555; margin-bottom: 10px; display: block; }
    .grad-guide { margin-top: 15px; padding: 10px; background: #f8f9fa; border-radius: 4px; font-size: 11px; color: #333; border: 1px solid #ddd; }
    .grad-guide code { background: #e9ecef; padding: 1px 3px; border-radius: 2px; font-family: monospace; font-weight: bold; }

<body>

<main class="pane-main">
  <section class="pane-left">
    <div class="area-editor">
      <div style="font-size:9px; font-weight:bold; color:#888; margin-bottom: 2px;">TJA EDITOR</div>
      <textarea class="input" placeholder="TJA data..."></textarea>
    </div>
    <div class="area-errors"><div class="errors">No error</div></div>
  </section>
  <section class="pane-right">
    <div class="area-pages">
      <div class="page page-preview"></div>
      <div class="page page-statistics is-hidden">
        <h2>譜面情報</h2>
        <span id="st-title" class="st-main-title"></span>
        <span id="st-subtitle" class="st-main-subtitle"></span>
        <div class="stat-row"><span class="stat-label">難易度</span><span id="st-diff"></span></div>
        <div class="stat-row"><span class="stat-label">BPM</span><span id="st-bpm"></span></div>
        <div class="stat-row"><span class="stat-label">ノーツ数</span><span id="st-notes"></span></div>
        <div class="stat-row"><span class="stat-label">演奏時間</span><span id="st-time"></span></div>
        <div class="stat-row"><span class="stat-label">平均密度</span><span id="st-density"></span></div>
        <div class="stat-row" style="flex-direction: column;"><span class="stat-label">連打秒数</span><span id="st-renda" style="font-size: 1em; line-height: 1.6; white-space: pre-wrap;"></span></div>
        <div id="density-svg-wrapper" style="background:#1a1a1a; margin-top:10px; border-radius:4px; padding:5px;"><svg id="density-svg" style="display:block; margin-left:-10px;"></svg></div>
      </div>
      <div class="page page-gradation is-hidden">
        <h2>グラデーション設定</h2>
        <div id="grad-list" style="margin-bottom:10px; font-size:11px; color:#555;">独自コマンドを解析します</div>
        <button class="button" id="btn-grad-replace" style="width:100%; background:#007bff; color:white;">#SCROLLを置換</button>
        <div class="grad-guide">
          <strong>【独自コマンド解説】</strong><br>
          <code>#GRADSTART [開始] [終了] (a[加速度])</code><br>
          <code>... 音符データ ...</code><br>
          <code>#GRADEND</code><br>
          ■等差: aなし<br>
          ■等比: a1.0〜a2.0推奨<br>
          ※終点の次の小節頭に終了値を配置。<br>
          ※ブロック内の既存#SCROLLは自動で削除されます。
        </div>
      </div>
    </div>
  </section>
</main>

<footer class="area-footer">
  <div class="button-group controls-diff">
    <span class="button btn-diff-0 is-hidden" data-value='0'>かんたん</span>
    <span class="button btn-diff-1 is-hidden" data-value='1'>ふつう</span>
    <span class="button btn-diff-2 is-hidden" data-value='2'>むずかしい</span>
    <span class="button btn-diff-3 is-hidden" data-value='3'>おに</span>
    <span class="button btn-diff-4 is-hidden" data-value='4'>裏おに</span>
  </div>
  <div class="button-group controls-page">
    <span class="button btn-page-preview is-active" data-value='preview'>プレビュー</span>
    <span class="button btn-page-statistics" data-value='statistics'>情報</span>
    <span class="button btn-page-gradation" data-value='gradation'>グラデ</span>
    <button class="button" style="background:#6c757d; color:white; border:none;" id="btn-open">読込</button>
    <button class="button" style="background:#28a745; color:white; border:none;" id="btn-tja-save">TJA</button>
    <button class="button" style="background:#28a745; color:white; border:none;" id="btn-save">PNG</button>
    <input type="file" id="file-input" class="is-hidden" accept="*/*">
    <div style="margin-left:auto; display:flex; gap:2px;">
        <button class="button" id="zoom-out" style="width:34px;">－</button>
        <button class="button" id="zoom-in" style="width:34px;">＋</button>
    </div>
  </div>
</footer>

<script>
/** 共通BPM整形 **/
const formatBpm = (val) => {
    let num = Math.round(val * 1000) / 1000;
    return (num % 1 === 0) ? num.toString() : num.toFixed(3).replace(/\.?0+$/, "");
};
const getNoteX = (beat) => 30 + (beat * 48);
const getRowY = (row) => 130 + (row * 74) + 20;

/** mc2tja **/
const gcd = (a, b) => b ? gcd(b, a % b) : a;
const lcm = (a, b) => (a === 0 || b === 0) ? 0 : Math.abs(a * b) / gcd(a, b);
function convertMCtoTJA(mcContent) {
    const mc = JSON.parse(mcContent); let tja = "";
    const balloons = mc.note.filter(n => n.style === 6 && n.hits).map(n => n.hits).join(',');
    const initialBpm = (mc.time && mc.time[0]) ? mc.time[0].bpm : 120;
    tja += `TITLE:${mc.meta.song.title || ""}\nSUBTITLE:--${mc.meta.song.artist || ""}\nBPM:${formatBpm(initialBpm)}\nWAVE:${mc.note.find(n => n.sound)?.sound || ""}\nOFFSET:${((mc.note.find(n => n.sound)?.offset || 0) / -1000).toFixed(3)}\nDEMOSTART:${mc.meta && mc.meta.preview ? (mc.meta.preview / 1000).toFixed(3) : "0"}\n\nCOURSE:Oni\nLEVEL:${mc.meta.version ? mc.meta.version.replace(/[^0-9]/g, '') : "10"}\nBALLOON:${balloons}\n\n#START\n`;
    const barBeats = 4; const notesByBar = {}; const bpmChangesByBar = {}; let maxBarIdx = 0;
    mc.note.forEach(n => { if (n.hasOwnProperty('column')) { const tb = n.beat[0] + (n.beat[1] / n.beat[2]); const bi = Math.floor(tb / barBeats); if (!notesByBar[bi]) notesByBar[bi] = []; notesByBar[bi].push(n); maxBarIdx = Math.max(maxBarIdx, bi); } });
    if (mc.time) { mc.time.forEach((t, i) => { if (i === 0) return; const tb = t.beat[0] + (t.beat[1] / t.beat[2]); const bi = Math.floor(tb / barBeats); if (!bpmChangesByBar[bi]) bpmChangesByBar[bi] = []; bpmChangesByBar[bi].push(t); maxBarIdx = Math.max(maxBarIdx, bi); }); }
    for (let b = 0; b <= maxBarIdx; b++) {
        const cn = notesByBar[b] || []; const cb = bpmChangesByBar[b] || []; let bLCM = 1;
        cn.forEach(n => { const bib = n.beat[0] % barBeats; bLCM = lcm(barLCM, (barBeats * n.beat[2]) / gcd(bib * n.beat[2] + n.beat[1], barBeats * n.beat[2])); });
        cb.forEach(t => { const bib = t.beat[0] % barBeats; bLCM = lcm(barLCM, (barBeats * t.beat[2]) / gcd(bib * t.beat[2] + t.beat[1], barBeats * t.beat[2])); });
        const bChars = new Array(bLCM).fill('0'); const bTicks = {};
        cb.forEach(t => { const bib = t.beat[0] % barBeats; const pos = Math.round(((bib + (t.beat[1] / t.beat[2])) / barBeats) * bLCM); bTicks[pos] = `#BPMCHANGE ${formatBpm(t.bpm)}`; });
        cn.forEach(n => { const bib = n.beat[0] % barBeats; const pos = Math.round(((bib + (n.beat[1] / n.beat[2])) / barBeats) * bLCM);
            let type = "1"; if (n.style === 2) type = "2"; if (n.style === 1) type = "3"; if (n.style === 3) type = "4"; if (n.style === 4) type = "5"; if (n.style === 6) type = "7";
            if (pos < bLCM) bChars[pos] = type;
            if (n.endbeat) { const etb = n.endbeat[0] + (n.endbeat[1] / n.endbeat[2]); if (Math.floor(etb / barBeats) === b) { const ebib = n.endbeat[0] % barBeats; const epos = Math.round(((ebib + (n.endbeat[1] / n.endbeat[2])) / barBeats) * bLCM); if (epos < bLCM) bChars[epos] = "8"; } }
        });
        let bOut = ""; for (let i = 0; i < bLCM; i++) { if (bTicks[i]) bOut += (bOut === "" ? "" : "\n") + bTicks[i] + "\n"; bOut += bChars[i]; }
        tja += bOut + ",\n";
    }
    tja += "#END"; return tja;
}

async function loadFileWithEncoding(arrayBuffer) {
    const ui8 = new Uint8Array(arrayBuffer);
    try { return new TextDecoder('utf-8', {fatal: true}).decode(ui8); } 
    catch(e) { return new TextDecoder('shift-jis').decode(ui8); }
}

/** TJA Parser **/
function parseTJA(tja) {
  const lines = tja.split(/\r?\n/).map(l => l.trim());
  const headers = { title: '', subtitle: '', bpm: 120, wave: '' };
  const courses = {}; let currentCourse = null, dataBuf = "", eventBuf = [], currentMeasure = [4, 4];
  for (let line of lines) {
    const raw = line.split('//')[0].trim(); if (!raw) continue;
    if (raw.startsWith('TITLE:')) headers.title = raw.substring(6).trim();
    else if (raw.startsWith('SUBTITLE:')) headers.subtitle = raw.substring(9).trim().replace(/^--\s*/, '').replace(/^[+-]/, '');
    else if (raw.startsWith('BPM:')) headers.bpm = parseFloat(raw.substring(4)) || 120;
    else if (raw.startsWith('WAVE:')) headers.wave = raw.substring(5).trim();
    else if (raw.startsWith('COURSE:')) {
      const cv = raw.substring(7).trim().toLowerCase();
      let id = 0; if (cv === 'normal' || cv === '1') id = 1; else if (cv === 'hard' || cv === '2') id = 2; else if (cv === 'oni' || cv === '3') id = 3; else if (cv === 'edit' || cv === '4') id = 4;
      currentCourse = { course: id, headers: { level: 0, balloon: [], ttRowBeat: 16 }, measures: [] };
      courses[id] = currentCourse; dataBuf = ""; eventBuf = [];
    } else if (currentCourse) {
      if (raw.startsWith('LEVEL:')) currentCourse.headers.level = parseInt(raw.substring(6));
      else if (raw.startsWith('BALLOON:')) currentCourse.headers.balloon = raw.substring(8).split(/[, ]+/).filter(x=>x).map(Number);
      else if (raw.match(/^#([A-Z]+)(?:\s+(.+))?/i)) {
        const m = raw.match(/^#([A-Z]+)(?:\s+(.+))?/i);
        if (m[1].toUpperCase() === 'MEASURE' && m[2]) currentMeasure = m[2].split('/').map(Number);
        eventBuf.push({ name: m[1].toLowerCase(), value: (m[2] || '').trim(), pos: dataBuf.length });
      } else if (raw.match(/^[0-9A-G,]*$/)) {
        for (let char of raw) {
          if (char === ',') { currentCourse.measures.push({ length: [...currentMeasure], data: dataBuf, events: [...eventBuf] }); dataBuf = ""; eventBuf = []; }
          else dataBuf += char;
        }
      }
    }
  }
  return { headers, courses };
}

/** 描画ヘルパー **/
const drawLine = (ctx, sx, sy, ex, ey, w, s) => { ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.lineWidth = w; ctx.strokeStyle = s; ctx.stroke(); };
const drawRect = (ctx, x, y, w, h, f) => { ctx.fillStyle = f; ctx.fillRect(x, y, w, h); };
const drawCircle = (ctx, x, y, r, f) => { ctx.beginPath(); ctx.arc(x, y, r, 0, 2 * Math.PI); ctx.fillStyle = f; ctx.fill(); };
const drawText = (ctx, x, y, t, f, c, b = 'middle', a = 'center') => { ctx.font = f; ctx.textBaseline = b; ctx.textAlign = a; ctx.fillStyle = c; ctx.fillText(t, x, y); };
const drawPixelText = (ctx, x, y, t, c, b = 'middle', a = 'center') => { drawText(ctx, x, y, t, '5px "Pixel 3x5"', c, b, a); };

function drawNote(ctx, x, y, c, b) { const r = b ? 12 : 9; drawCircle(ctx, x, y, r, '#000'); drawCircle(ctx, x, y, r-1, '#fff'); drawCircle(ctx, x, y, r-2, c); }
function drawBalloon(ctx, ri, nb, eb, count) {
  const x = getNoteX(nb), y = getRowY(ri) + 35, ex = getNoteX(eb);
  ctx.lineCap = 'round'; ctx.strokeStyle = '#000'; ctx.lineWidth = 18; drawLine(ctx, x, y, ex, y, ctx.lineWidth, '#000');
  ctx.strokeStyle = '#fff'; ctx.lineWidth -= 2; drawLine(ctx, x, y, ex, y, ctx.lineWidth, '#fff');
  ctx.strokeStyle = '#fb4'; ctx.lineWidth -= 2; drawLine(ctx, x, y, ex, y, ctx.lineWidth, '#fb4');
  drawCircle(ctx, x, y, 9, '#000'); drawCircle(ctx, x, y, 8, '#fff'); drawCircle(ctx, x, y, 7, '#fb4');
  drawRect(ctx, x, y-3, 5, 6, '#fb4'); drawPixelText(ctx, x, y+0.5, count.toString(), '#000'); ctx.lineCap = 'butt';
}
function renderPath(ctx, rs, sR, sB, eR, eB) {
  ctx.beginPath(); let sx = getNoteX(sB), sy = getRowY(sR) + 35, ex = getNoteX(eB), ey = getRowY(eR) + 35;
  if (sR === eR) { ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); }
  else { ctx.moveTo(sx, sy); ctx.lineTo(getNoteX(16) + 30, sy); for (let r = sR + 1; r < eR; r++) { ctx.moveTo(0, getRowY(r) + 35); ctx.lineTo(getNoteX(16) + 30, getRowY(r) + 35); } ctx.moveTo(0, ey); ctx.lineTo(ex, ey); } ctx.stroke();
}

function drawChart(chart, courseId) {
  const course = chart.courses[courseId]; if (!course) return document.createElement('canvas');
  const dNames = ['かんたん', 'ふつう', 'むずかしい', 'おに', '裏おに'];
  const rows = []; let rTemp = [], rBeat = 0;
  course.measures.forEach(m => { const mb = (m.length[0] / m.length[1]) * 4; if (16 < rBeat + mb) { rows.push({ beats: rBeat, measures: rTemp }); rTemp = []; rBeat = 0; } rTemp.push(m); rBeat += mb; });
  if (rTemp.length) rows.push({ beats: rBeat, measures: rTemp });
  const cW = 30 + (48 * 16) + 30, cH = 130 + (rows.length * 74) + 20;
  const dpr = window.devicePixelRatio || 1;
  const canvas = document.createElement('canvas'); canvas.width = cW * dpr; canvas.height = cH * dpr;
  canvas.style.width = cW + 'px'; canvas.style.height = cH + 'px';
  const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
  drawRect(ctx, 0, 0, cW, cH, CHART_BG);
  drawText(ctx, 20, 20, chart.headers.title, 'bold 28px sans-serif', '#000', 'top', 'left');
  if(chart.headers.subtitle) drawText(ctx, 20, 52, chart.headers.subtitle, 'bold 18px sans-serif', '#000', 'top', 'left');
  drawText(ctx, 20, 84, `${dNames[course.course]} ${'★'.repeat(course.headers.level)}`, 'bold 16px sans-serif', '#000', 'top', 'left');

  let gActive = false, gStart = null;
  rows.forEach((row, ri) => {
    let bAcc = 0;
    row.measures.forEach(m => {
      const mb = (m.length[0]/m.length[1])*4;
      m.events.forEach(e => {
        const eb = bAcc + (mb / (m.data.length || 1)) * e.pos;
        if (e.name === 'gogostart') { gActive = true; gStart = [ri, eb]; }
        if (e.name === 'gogoend' && gActive) {
          if (gStart[0] === ri) drawRect(ctx, getNoteX(gStart[1]), getRowY(ri), getNoteX(eb)-getNoteX(gStart[1]), 52, '#fbb');
          else { drawRect(ctx, getNoteX(gStart[1]), getRowY(gStart[0]), getNoteX(16) - getNoteX(gStart[1]) + 30, 52, '#fbb'); for(let r=gStart[0]+1; r<ri; r++) drawRect(ctx, 0, getRowY(r), cW, 52, '#fbb'); drawRect(ctx, 0, getRowY(ri), getNoteX(eb), 52, '#fbb'); }
          gStart = null; gActive = false;
        }
      });
      bAcc += mb;
    });
    if (gActive && gStart) { drawRect(ctx, getNoteX(gStart[1]), getRowY(gStart[0]), getNoteX(16)-getNoteX(gStart[1])+30, 52, '#fbb'); gStart = [ri+1, 0]; }
  });

  rows.forEach((row, ri) => {
    const y = getRowY(ri); drawRect(ctx, 0, y + 18, cW, 34, '#000'); drawRect(ctx, 0, y + 20, cW, 30, '#fff'); drawRect(ctx, 0, y + 22, cW, 26, '#999');
    let bAcc = 0;
    row.measures.forEach((m, mi) => {
      const mb = (m.length[0]/m.length[1])*4;
      for(let g=0; g<mb; g+=0.5) { const gx = getNoteX(bAcc + g); drawLine(ctx, gx, y+18, gx, y+52, g%1===0 ? 0.8 : 0.4, '#ffffff66'); }
      drawLine(ctx, getNoteX(bAcc), y, getNoteX(bAcc), y + 52, 1.2, '#fff');
      drawPixelText(ctx, getNoteX(bAcc) + 2, y + 17, (mi + 1 + rows.slice(0,ri).reduce((a,b)=>a+b.measures.length,0)).toString(), '#000', 'bottom', 'left');
      if(ri === 0 && mi === 0) drawPixelText(ctx, getNoteX(bAcc) + 2, y + 11, formatBpm(chart.headers.bpm).toString(), '#00f', 'bottom', 'left');
      m.events.forEach(e => {
        if (e.name === 'bpmchange' || e.name === 'scroll') {
          const ex = getNoteX(bAcc + (mb / (m.data.length || 1)) * e.pos); drawLine(ctx, ex, y, ex, y + 52, 1, '#444');
          const isBPM = e.name === 'bpmchange'; drawPixelText(ctx, ex + 2, isBPM ? y + 11 : y + 5, e.value.toString(), isBPM ? '#00f' : '#f00', 'bottom', 'left');
        }
      });
      bAcc += mb;
    });
    drawLine(ctx, getNoteX(bAcc), y, getNoteX(bAcc), y + 52, 1.5, '#fff');
  });

  let lEnd = null, bIdx = 0;
  for (let ri = rows.length - 1; ri >= 0; ri--) {
    const row = rows[ri]; let ab = 0; row.measures.forEach(m => { m.absB = ab; ab += (m.length[0]/m.length[1])*4; });
    for (let mi = row.measures.length - 1; mi >= 0; mi--) {
      const m = row.measures[mi]; const mb = (m.length[0]/m.length[1])*4;
      for (let i = m.data.length - 1; i >= 0; i--) {
        const note = m.data[i], nb = m.absB + (mb / m.data.length) * i;
        const nx = getNoteX(nb), ny = getRowY(ri) + 35;
        if (note === '8') lEnd = [ri, nb];
        else if (note === '1') drawNote(ctx, nx, ny, '#f33', false);
        else if (note === '2') drawNote(ctx, nx, ny, '#5cf', false);
        else if (note === '3') drawNote(ctx, nx, ny, '#f33', true);
        else if (note === '4') drawNote(ctx, nx, ny, '#5cf', true);
        else if (note === '7' && lEnd) { drawBalloon(ctx, ri, nb, lEnd[1], course.headers.balloon[bIdx++] || 5); lEnd = null; }
        else if ((note === '5' || note === '6') && lEnd) {
          ctx.lineCap = 'round'; ctx.strokeStyle = '#000'; ctx.lineWidth = (note === '6' ? 12 : 9) * 2;
          renderPath(ctx, rows, ri, nb, lEnd[0], lEnd[1]); ctx.strokeStyle = '#fff'; ctx.lineWidth -= 2; renderPath(ctx, rows, ri, nb, lEnd[0], lEnd[1]);
          ctx.strokeStyle = '#fe4'; ctx.lineWidth -= 2; renderPath(ctx, rows, ri, nb, lEnd[0], lEnd[1]); ctx.lineCap = 'butt'; lEnd = null;
        }
      }
    }
  }
  return canvas;
}

/** 統計ロジック **/
function getStats(chart, courseId) {
  const course = chart.courses[courseId];
  let combo = 0, firstT = null, lastT = 0, currentBpm = chart.headers.bpm;
  let bpmMap = new Map(); let bpms = [currentBpm], allNoteTimes = [], rendaSecs = [], rStartT = null, currentTime = 0;
  course.measures.forEach((m) => {
    const mb = (m.length[0] / m.length[1]) * 4, nis = m.data.length || 1, duration = (60 / currentBpm) * mb;
    for (let i = 0; i < m.data.length; i++) {
        const char = m.data[i], t = currentTime + (duration * i / nis);
        if ("13".includes(char)) { allNoteTimes.push({ time: t, type: 'don' }); combo++; if (firstT === null) firstT = t; lastT = t; }
        else if ("24".includes(char)) { allNoteTimes.push({ time: t, type: 'ka' }); combo++; if (firstT === null) firstT = t; lastT = t; }
        else if (char === "5" || char === "6") rStartT = t;
        else if (char === "8" && rStartT !== null) { rendaSecs.push(t - rStartT); rStartT = null; }
    }
    bpmMap.set(currentBpm, (bpmMap.get(currentBpm) || 0) + duration);
    m.events.forEach(e => { if(e.name === 'bpmchange') { currentBpm = parseFloat(e.value); bpms.push(currentBpm); } });
    currentTime += duration;
  });
  const perfTime = lastT - firstT;
  let measureData = [];
  for (let i = 0; i < 100; i++) {
    const start = firstT + i * (perfTime / 100), end = start + (perfTime / 100);
    const win = allNoteTimes.filter(n => n.time >= start && n.time < end);
    measureData.push({ don: win.filter(n => n.type === 'don').length, ka: win.filter(n => n.type === 'ka').length, nps: win.length / (perfTime / 100 || 1) });
  }
  const mainBpm = bpmMap.size ? [...bpmMap.entries()].reduce((a, b) => a[1] > b[1] ? a : b)[0] : currentBpm;
  return { combo, perfTime, minBpm: Math.min(...bpms), maxBpm: Math.max(...bpms), mainBpm, density: (combo - 1) / (perfTime || 1), measures: measureData, rendas: rendaSecs };
}

function drawDensityGraph(measureData) {
  const container = u('#density-svg-wrapper').first(); const width = container.clientWidth, height = 100;
  const margin = { left: 25, right: 5, top: 10, bottom: 5 };
  const svg = d3.select("#density-svg").attr("width", width).attr("height", height + 25).html("");
  const x = d3.scaleBand().domain(d3.range(measureData.length)).range([margin.left, width - margin.right]).padding(0.1);
  const y = d3.scaleLinear().domain([0, d3.max(measureData, d => d.nps) * 1.1 || 10]).range([height, margin.top]);
  svg.append("g").attr("transform", `translate(${margin.left},0)`).call(d3.axisLeft(y).ticks(5).tickSize(-width + margin.left + margin.right)).attr("color", "#444");
  const layers = d3.stack().keys(["don", "ka"])(measureData.map(d => { const total = (d.don + d.ka) || 1; return { don: (d.don / total) * d.nps, ka: (d.ka / total) * d.nps }; }));
  svg.append("g").selectAll("g").data(layers).enter().append("g").attr("fill", (d, i) => i === 0 ? "#f33" : "#5cf")
     .selectAll("rect").data(d => d).enter().append("rect").attr("x", (d, i) => x(i)).attr("y", d => y(d[1])).attr("height", d => y(d[0]) - y(d[1])).attr("width", x.bandwidth());
}

/** グラデーション置換 **/
function replaceGradation() {
    const editor = u('.input').first(); const val = editor.value; const chart = parseTJA(val);
    const courseId = selectedDifficulty || Object.keys(chart.courses)[0]; const course = chart.courses[courseId];
    if (!course) return;
    let currentBpm = chart.headers.bpm, currentTime = 0; const mTimings = [];
    course.measures.forEach(m => { mTimings.push({ start: currentTime, bpm: currentBpm }); const mb = 4;
        m.events.forEach(e => { if(e.name === 'bpmchange') currentBpm = parseFloat(e.value); });
        currentTime += (60/currentBpm)*mb;
    });
    mTimings.push({ start: currentTime, bpm: currentBpm });
    const regex = /#GRADSTART\s+([^\n]+)\n([\s\S]+?)\n#GRADEND/g;
    const newText = val.replace(regex, (match, args, content) => {
        const parts = args.trim().split(/\s+/); let sHS = parseFloat(parts[0]), eHS = parseFloat(parts[1]);
        let hasAccel = parts[2] && parts[2].toLowerCase().startsWith('a');
        let accel = hasAccel ? parseFloat(parts[2].substring(1)) : 1.0;
        if (hasAccel) accel = 1 + (accel - 1) * 0.4;
        
        // 修正: コンマを命令文から分離するための高度な分割
        const tokens = content.match(/(#[A-Z]+(?:\s+[^\n]*)?)|([0-9A-G])|(,)|(\s+)/gi) || [];
        let result = "", lastHS = -1;
        const subMeasuresCount = tokens.filter(t => t === ',').length || 1;
        const totalT = mTimings[subMeasuresCount].start - mTimings[0].start;

        let currentMIdx = 0;
        let charIdxInM = 0;
        
        for(let tok of tokens) {
            if(tok.startsWith('#')) {
                if(!tok.toLowerCase().startsWith('#scroll')) result += tok;
                continue;
            }
            if(tok === ',') {
                result += tok; currentMIdx++; charIdxInM = 0;
                continue;
            }
            if(tok.match(/\s+/)) { result += tok; continue; }

            if("12345679".includes(tok)) {
                const mBpm = mTimings[currentMIdx].bpm;
                const mStart = mTimings[currentMIdx].start - mTimings[0].start;
                // 推測されるこの小節のノーツ数
                const notesInM = tokens.slice(tokens.indexOf(tok)).findIndex(t => t === ',') || 1;
                
                const t = mStart + (4 * charIdxInM / notesInM) * (60/mBpm);
                const progress = Math.min(1, t / totalT);
                let hs = hasAccel ? sHS * Math.pow(eHS/sHS, Math.pow(progress, accel)) : sHS + (eHS - sHS) * progress;
                hs = Math.round(hs * 1000) / 1000;
                if(hs !== lastHS) { result += `\n#SCROLL ${parseFloat(hs.toFixed(3))}\n`; lastHS = hs; }
                result += tok;
                charIdxInM++;
            } else {
                result += tok;
            }
        }
        return result.trim() + `\n#SCROLL ${parseFloat(eHS.toFixed(3))}`;
    });
    editor.value = newText;
}

/** UI Logic **/
let tjaParsed = null, selectedDifficulty = '', selectedPage = 'preview', zoomLevel = 100;
function updateUI() {
  u('.controls-diff .button').addClass('is-hidden');
  if(tjaParsed && tjaParsed.courses) Object.keys(tjaParsed.courses).forEach(d => u(`.btn-diff-${d}`).removeClass('is-hidden'));
  u('.button.is-active').removeClass('is-active');
  u(`.btn-diff-${selectedDifficulty}`).addClass('is-active');
  u(`.btn-page-${selectedPage}`).addClass('is-active');
  u('.page').addClass('is-hidden'); u(`.page-${selectedPage}`).removeClass('is-hidden');
  if (tjaParsed && selectedDifficulty !== '') {
    if (selectedPage === 'preview') {
      u('.page-preview').empty().append(drawChart(tjaParsed, selectedDifficulty));
      u('.page-preview').first().style.width = zoomLevel + '%';
    } else if (selectedPage === 'statistics') {
      const s = getStats(tjaParsed, selectedDifficulty); const dNames = ['かんたん','ふつう','むずかしい','おに','裏おに']; const c = tjaParsed.courses[selectedDifficulty];
      u('#st-title').text(tjaParsed.headers.title); u('#st-subtitle').text(tjaParsed.headers.subtitle || '');
      u('#st-diff').text(`${dNames[c.course]} ★${c.headers.level}`);
      u('#st-bpm').text(s.minBpm === s.maxBpm ? `${formatBpm(s.minBpm)}` : `${formatBpm(s.minBpm)}-${formatBpm(s.maxBpm)} (${formatBpm(s.mainBpm)})`);
      u('#st-notes').text(s.combo); u('#st-time').text(s.perfTime.toFixed(2)+"s"); u('#st-density').text(s.density.toFixed(3)+" /s");
      const rHtml = s.rendas.map(r => r.toFixed(2) + "s").join(" + ") + (s.rendas.length ? `<br><br>(合計: ${s.rendas.reduce((a,b)=>a+b,0).toFixed(2)}s)` : "0.00s");
      u('#st-renda').html(rHtml); drawDensityGraph(s.measures);
    }
  }
}
const processFunc = () => {
  const val = u('.input').first().value; if(!val) return;
  try {
    tjaParsed = parseTJA(val);
    if (!selectedDifficulty || !tjaParsed.courses[selectedDifficulty]) selectedDifficulty = Object.keys(tjaParsed.courses)[0];
    updateUI(); u('.errors').text('No error');
  } catch(e) { u('.errors').text(e.message); }
};
u('.input').on('input', processFunc);
u('#btn-open').on('click', () => u('#file-input').first().click());
u('#file-input').on('change', async (e) => {
    const f = e.target.files[0]; if(!f) return;
    try {
        let content = ""; const ab = await f.arrayBuffer();
        if (f.name.toLowerCase().match(/\.(zip|mcz)$/)) {
            const zip = await JSZip.loadAsync(ab);
            const tjaF = Object.values(zip.files).find(file => file.name.toLowerCase().endsWith('.tja') || file.name.toLowerCase().endsWith('.mc'));
            if (!tjaF) throw new Error("譜面ファイルが見つかりません");
            const buf = await tjaF.async("arraybuffer");
            content = tjaF.name.endsWith('.mc') ? convertMCtoTJA(await loadFileWithEncoding(buf)) : await loadFileWithEncoding(buf);
        } else {
            content = f.name.endsWith('.mc') ? convertMCtoTJA(await loadFileWithEncoding(ab)) : await loadFileWithEncoding(ab);
        }
        u('.input').first().value = content; processFunc();
    } catch(err) { u('.errors').text(err.message); }
});
u('#zoom-in').on('click', (e) => { e.preventDefault(); zoomLevel += 20; updateUI(); });
u('#zoom-out').on('click', (e) => { e.preventDefault(); zoomLevel = Math.max(100, zoomLevel - 20); updateUI(); });
u('#btn-save').on('click', () => {
  const cv = u('canvas').first(); if (!cv) return;
  const link = document.createElement('a'); link.download = (tjaParsed.headers.title || 'chart') + '.png'; link.href = cv.toDataURL(); link.click();
});
u('#btn-tja-save').on('click', () => {
  if (!tjaParsed) return;
  const codes = Encoding.convert(Encoding.stringToCode(u('.input').first().value), 'SJIS', 'UNICODE');
  const blob = new Blob([new Uint8Array(codes)], { type: 'application/octet-stream' });
  const name = (tjaParsed.headers.wave || "chart.tja").split('.')[0] + ".tja";
  const link = document.createElement('a'); link.download = name; link.href = URL.createObjectURL(blob); link.click();
});
u('#btn-grad-replace').on('click', () => { replaceGradation(); processFunc(); });
u('.controls-diff .button[data-value]').on('click', e => { selectedDifficulty = u(e.target).data('value'); updateUI(); });
u('.controls-page .button[data-value]').on('click', e => { selectedPage = u(e.target).data('value'); updateUI(); });
</script>
